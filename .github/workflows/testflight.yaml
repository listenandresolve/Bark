name: Build Cron Bark Testflight

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 */2 *'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:

      # ════════════════════════════════════════════
      # ÉTAPE 1 — Récupération du code source
      # ════════════════════════════════════════════
      - name: "📥 Checkout du code source Bark"
        uses: actions/checkout@v4

      # ════════════════════════════════════════════
      # ÉTAPE X — Nettoyage Total et Injection Absolue
      # ════════════════════════════════════════════
      - name: "🧹 Nettoyage total et réparation du projet"
        env:
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          BUNDLE_APP_GROUP:  ${{ secrets.BUNDLE_APP_GROUP }}
        run: |
          echo "1. Destruction des profils hardcodés..."
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' Bark.xcodeproj/project.pbxproj
          sed -i '' '/PROVISIONING_PROFILE/d' Bark.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Bark.xcodeproj/project.pbxproj
          
          echo "2. Remplacement du Bundle ID..."
          find . -path ./Pods -prune -o -type f \( -name "*.pbxproj" -o -name "*.entitlements" -o -name "*.swift" -o -name "Info.plist" \) -exec sed -i '' "s/me\.fin\.bark/$BUNDLE_ID/g" {} +
          
          echo "3. Réparation des Entitlements..."
          find . -type f -name "*.entitlements" | while read filepath; do
            # Suppression des privilèges interdits
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.usernotifications.critical-alerts" "$filepath" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.usernotifications.communication" "$filepath" 2>/dev/null || true
            
            # Reconstruction FORCÉE de l'App Group (on rase et on reconstruit proprement)
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.application-groups" "$filepath" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.application-groups array" "$filepath"
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.application-groups:0 string $BUNDLE_APP_GROUP" "$filepath"
          done

          echo "4. Injection de la conformité d'exportation"
          # On cherche tous les Info.plist (sauf dans les Pods)
          # On utilise une boucle for pour être sûr de l'exécution
          PLISTS=$(find . -name "Info.plist" -not -path "*/Pods/*")
          
          for plist in $PLISTS; do
            echo "🔧 Traitement de : $plist"
            # On supprime la clé si elle existe déjà (pour éviter les doublons)
            /usr/libexec/PlistBuddy -c "Delete :ITSAppUsesNonExemptEncryption" "$plist" 2>/dev/null || true
            # On ajoute la clé proprement en booléen
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$plist"
            
            # Vérification immédiate dans le log
            VALUE=$(/usr/libexec/PlistBuddy -c "Print :ITSAppUsesNonExemptEncryption" "$plist")
            echo "✅ Valeur injectée dans $(basename $plist) : $VALUE"
          done

          echo "5. Réparation du code Swift..."
          # On s'assure qu'il n'y a plus aucune trace de l'ancien groupe
          find . -type f -name "*.swift" -exec sed -i '' "s/group\.bark/$BUNDLE_APP_GROUP/g" {} +
          find . -type f -name "*.swift" -exec sed -i '' "s/group\.$BUNDLE_ID/$BUNDLE_APP_GROUP/g" {} +
          
          echo "6. Suppression du Appfile de l'auteur pour éviter les conflits d'ID"
          rm -f fastlane/Appfile

      # ════════════════════════════════════════════
      # ÉTAPE 2 — Sélection de la version Xcode
      # ════════════════════════════════════════════
      - name: "🛠 Sélection de Xcode (latest stable)"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # ════════════════════════════════════════════
      # ÉTAPE 3 — Configuration de Ruby
      # ════════════════════════════════════════════
      - name: "💎 Setup Ruby pour fastlane"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # ════════════════════════════════════════════
      # ÉTAPE 4 — Cache CocoaPods
      # ════════════════════════════════════════════
      - name: "📦 Cache CocoaPods"
        uses: actions/cache@v4
        id: pods-cache
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # ════════════════════════════════════════════
      # ÉTAPE 5 — Installation des CocoaPods
      # ════════════════════════════════════════════
      - name: "📦 Installation des CocoaPods"
        run: |
          pod install --repo-update

      # ════════════════════════════════════════════
      # ÉTAPE 7 — Import du certificat de signature
      # ════════════════════════════════════════════
      - name: "🔐 Import du certificat de signature"
        env:
          CERTIFICATE_BASE64:   ${{ secrets.P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          # Mot de passe aléatoire généré à la volée — aucun secret à créer
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Création du trousseau temporaire
          security create-keychain \
            -p "$KEYCHAIN_PASSWORD" \
            ~/Library/Keychains/build.keychain-db

          # Désactive le verrouillage automatique
          security set-keychain-settings \
            -lut 21600 \
            ~/Library/Keychains/build.keychain-db

          # Déverrouillage
          security unlock-keychain \
            -p "$KEYCHAIN_PASSWORD" \
            ~/Library/Keychains/build.keychain-db

          # Ajout dans la liste des keychains actifs
          security list-keychains -d user -s \
            ~/Library/Keychains/build.keychain-db \
            ~/Library/Keychains/login.keychain-db

          # Décodage du certificat .p12
          echo "$CERTIFICATE_BASE64" | base64 --decode \
            > /tmp/certificate.p12

          # Import dans le trousseau
          security import /tmp/certificate.p12 \
            -k ~/Library/Keychains/build.keychain-db \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Autorisation d'accès sans popup
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            ~/Library/Keychains/build.keychain-db

          # Partage du mot de passe avec les étapes suivantes
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          rm /tmp/certificate.p12

          echo "✅ Certificat importé :"
          security find-identity -v -p codesigning \
            ~/Library/Keychains/build.keychain-db

      # ════════════════════════════════════════════
      # ÉTAPE 8 — Import des Provisioning Profiles
      # ════════════════════════════════════════════
      - name: "📋 Import des Provisioning Profiles"
        env:
          PP_MAIN_BASE64:    ${{ secrets.PP_MAIN_BASE64 }}
          PP_SERVICE_BASE64: ${{ secrets.PP_SERVICE_BASE64 }}
          PP_CONTENT_BASE64: ${{ secrets.PP_CONTENT_BASE64 }}
        run: |
          PP_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PP_DIR"

          echo "📥 Décodage et installation des Provisioning Profiles..."

          echo "$PP_MAIN_BASE64" | base64 --decode \
            > "$PP_DIR/bark_main.mobileprovision"
          echo "✅ Bark AppStore Main installé"

          echo "$PP_SERVICE_BASE64" | base64 --decode \
            > "$PP_DIR/bark_service.mobileprovision"
          echo "✅ Bark AppStore Service installé"

          echo "$PP_CONTENT_BASE64" | base64 --decode \
            > "$PP_DIR/bark_content.mobileprovision"
          echo "✅ Bark AppStore Content installé"

          echo ""
          echo "📋 Profiles installés :"
          ls -la "$PP_DIR/"

          for profile in "$PP_DIR"/*.mobileprovision; do
            echo ""
            echo "─── Provisioning ───"
            security cms -D -i "$profile" 2>/dev/null | \
              python3 -c '
          import plistlib, sys
          p = plistlib.loads(sys.stdin.buffer.read())
          ent = p.get("Entitlements", {})
          print("  Nom        : " + p.get("Name", "N/A"))
          print("  App ID     : " + ent.get("application-identifier", "N/A"))
          print("  App Groups : " + str(ent.get("com.apple.security.application-groups", "AUCUN GROUPE TROUVÉ !!!")))
          print("  Push       : " + ent.get("aps-environment", "Non"))
          '
          done

          echo ""
          echo "✅ Tous les profiles sont installés"

      # ════════════════════════════════════════════
      # ÉTAPE 9 — Génération de ExportOptions.plist
      # ════════════════════════════════════════════
      - name: "📄 Génération de ExportOptions.plist"
        env:
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          TEAM_ID:   ${{ secrets.TEAM_ID }}
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>Bark AppStore Main</string>
              <key>${BUNDLE_ID}.NotificationServiceExtension</key>
              <string>Bark AppStore Service</string>
              <key>${BUNDLE_ID}.NotificationContentExtension</key>
              <string>Bark AppStore Content</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <true/>
          </dict>
          </plist>
          EOF

          echo "✅ ExportOptions.plist généré :"
          cat ExportOptions.plist

      # ════════════════════════════════════════════
      # ÉTAPE 9.5 — Câblage Chirurgical des Profils (POST-PODS)
      # ════════════════════════════════════════════
      - name: "🔥 Câblage des profils dans Xcode"
        env:
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          cat << 'EOF' > force_signing.rb
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Bark.xcodeproj')
          
          # 1. On tue l'Auto-Signing à la racine du projet
          if project.root_object.attributes['TargetAttributes']
            project.root_object.attributes['TargetAttributes'].each do |target_id, attributes|
              attributes['ProvisioningStyle'] = 'Manual'
            end
          end
          
          # 2. On assigne CHAQUE profil à SA cible précise
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
              config.build_settings['DEVELOPMENT_TEAM'] = ENV['TEAM_ID']

              # AUTO-INCRÉMENTATION DU BUILD POUR TESTFLIGHT
              config.build_settings['CURRENT_PROJECT_VERSION'] = ENV['GITHUB_RUN_NUMBER']
              
              if target.name == 'Bark'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'Bark AppStore Main'
                config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = ENV['BUNDLE_ID']
              elsif target.name == 'NotificationServiceExtension'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'Bark AppStore Service'
                config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = "#{ENV['BUNDLE_ID']}.NotificationServiceExtension"
              elsif target.name == 'NotificationContentExtension'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'Bark AppStore Content'
                config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = "#{ENV['BUNDLE_ID']}.NotificationContentExtension"
              end
            end
          end
          project.save
          puts "✅ Profils injectés en dur dans le fichier Xcode !"
          EOF
          
          echo "📦 Installation de la librairie xcodeproj..."
          gem install xcodeproj --no-document
          
          echo "🔥 Exécution du script de câblage..."
          ruby force_signing.rb

      # ════════════════════════════════════════════
      # ÉTAPE 10 — Compilation et Upload TestFlight
      # ════════════════════════════════════════════
      - name: "🔨 Compilation et Upload TestFlight"
        env:
          LC_ALL: en_US.UTF-8
          LANG:   en_US.UTF-8
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          KEYCHAIN_PASSWORD: ${{ env.KEYCHAIN_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          # 1. Nettoyage du dossier fastlane de l'auteur
          rm -rf fastlane/

          # 2. Création du fichier de clé API JSON (Format STRICT attendu par Fastlane)
          # On remplace les sauts de ligne réels par des '\n' littéraux pour le JSON
          CLEAN_KEY=$(echo "$ASC_PRIVATE_KEY" | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')
          
          echo "{
            \"key_id\": \"$ASC_KEY_ID\",
            \"issuer_id\": \"$ASC_ISSUER_ID\",
            \"key\": \"$CLEAN_KEY\",
            \"is_sandbox\": false
          }" > api_key.json

          # 3. Déverrouiller le trousseau
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" ~/Library/Keychains/build.keychain-db
          
          # 4. Compilation (Gym)
          echo "🚀 Lancement de gym..."
          bundle exec fastlane gym \
            --workspace        "Bark.xcworkspace" \
            --scheme           "Bark" \
            --configuration    "Release" \
            --export_method    "app-store" \
            --output_directory "./build" \
            --output_name      "Bark_AppStore.ipa" \
            --export_options   "ExportOptions.plist" \
            --clean            true

          # 5. Upload (Pilot)
          echo "🚀 Upload vers TestFlight..."
          bundle exec fastlane pilot upload \
            --ipa "./build/Bark_AppStore.ipa" \
            --app_identifier "$BUNDLE_ID" \
            --api_key_path "api_key.json" \
            --skip_waiting_for_build_processing true \
            --skip_submission true

          # 6. Nettoyage
          rm api_key.json

      # ════════════════════════════════════════════
      # ÉTAPE 12 — Nettoyage du trousseau temporaire
      # ════════════════════════════════════════════
      - name: "🧹 Nettoyage du trousseau temporaire"
        if: always()
        run: |
          echo "🗑 Suppression du trousseau temporaire..."
          security delete-keychain \
            ~/Library/Keychains/build.keychain-db 2>/dev/null || true
          echo "✅ Trousseau supprimé"
          rm -rf ~/certs/
          echo "✅ Fichiers temporaires supprimés"
